<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reserva & Bolos | Nossa Carne</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #c0392b; 
            --secondary: #27ae60; 
            --accent: #f39c12;
            --text: #2d3436;
            --bg-overlay: rgba(255, 255, 255, 0.98); 
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; color: var(--text);
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('https://static.ifood-static.com.br/image/upload/t_high/logosgde/ef733dfb-3edf-42ef-9aea-9a87b00dcbdc/202510141310_BXc1_i.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .container { 
            width: 100%; max-width: 500px; background: var(--bg-overlay); 
            padding: 30px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            margin: 20px;
        }

        @media (max-width: 480px) {
            .container { margin: 10px; padding: 20px; border-radius: 20px; }
            body { align-items: flex-start; }
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header img { width: 85px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 10px; }
        .header h2 { margin: 0; font-size: 24px; color: #222; font-weight: 600; }

        .regras-box {
            background: #fff5f5; border-left: 5px solid var(--primary);
            padding: 15px; margin-bottom: 20px; border-radius: 12px; font-size: 11px; line-height: 1.6;
        }

        .grid-duplo { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .campo { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: #444; }
        
        .input-container { position: relative; }
        .input-container i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #a0a0a0; }
        
        input, select { 
            width: 100%; padding: 12px 12px 12px 42px; 
            border: 2px solid #eee; border-radius: 12px; 
            font-size: 15px; outline: none; background-color: #fdfdfd; appearance: none;
        }

        input:focus, select:focus { border-color: var(--primary); background-color: #fff; }

        .secao-bolo { margin-top: 15px; padding: 18px; border-radius: 15px; display: none; }
        .modo-cortesia { background: #f0fff4; border: 2px solid var(--secondary); }
        .modo-encomenda { background: #fffaf0; border: 2px solid var(--accent); }

        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; }
        .badge-cortesia { background: var(--secondary); color: #fff; }
        .badge-encomenda { background: var(--accent); color: #fff; }

        .info-pagamento {
            margin-top: 15px; padding: 15px; background: #fff; border-radius: 12px;
            font-size: 13px; border: 1px dashed var(--accent); line-height: 1.6; text-align: center;
        }

        .pix-qr-container { margin: 10px auto; width: 120px; height: 120px; background: #eee; display: flex; align-items: center; justify-content: center; border-radius: 10px; overflow: hidden; }
        .pix-qr-container img { width: 100%; height: 100%; object-fit: cover; }

        .btn-copiar {
            background: #f1f2f6; border: 1px solid #dfe4ea; padding: 8px; border-radius: 8px;
            font-size: 12px; font-weight: 600; cursor: pointer; color: #2f3542;
            display: inline-flex; align-items: center; gap: 5px; margin-top: 5px;
        }

        .btn-enviar { 
            width: 100%; padding: 16px; background: #25d366; color: white; 
            border: none; border-radius: 15px; font-size: 17px; font-weight: 700; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-top: 20px; transition: 0.3s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .btn-enviar:disabled { background: #bdc3c7; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://static.ifood-static.com.br/image/upload/t_high/logosgde/ef733dfb-3edf-42ef-9aea-9a87b00dcbdc/202510141310_BXc1_i.png" alt="Nossa Carne">
        <h2>Reserva Nossa Carne</h2>
    </div>

    <div class="regras-box">
        • <b>Reserva:</b> Segunda a Quinta (12h às 21:30).<br>
        • <b>Rolha:</b> Taxa de <b>R$ 40,00</b> p/ itens de fora.<br>
        • <b>Cortesia:</b> 10+ pessoas (1kg Grátis / Adicional R$ 95/kg).<br>
        • <b>Bolo Encomenda:</b> R$ 95,00/kg (50% sinal).
    </div>

    <form id="reservaForm">
        <div class="campo">
            <label>Seu Nome</label>
            <div class="input-container">
                <i class="fas fa-user"></i>
                <input type="text" id="nome" placeholder="Nome completo" required>
            </div>
        </div>

        <div class="grid-duplo">
            <div class="campo">
                <label>Data</label>
                <div class="input-container">
                    <i class="fas fa-calendar-alt"></i>
                    <input type="date" id="data" required onchange="validarFluxo()">
                </div>
            </div>
            <div class="campo">
                <label>Horário</label>
                <div class="input-container">
                    <i class="fas fa-clock"></i>
                    <input type="time" id="horario" required onchange="validarFluxo()">
                </div>
            </div>
        </div>

        <div class="campo">
            <label>Nº de Convidados</label>
            <div class="input-container">
                <i class="fas fa-users"></i>
                <input type="number" id="pessoas" min="1" max="50" placeholder="Ex: 12" required onchange="validarFluxo()">
            </div>
        </div>

        <div class="campo">
            <label>Deseja Bolo?</label>
            <div class="input-container">
                <i class="fas fa-birthday-cake"></i>
                <select id="querBolo" onchange="validarFluxo()">
                    <option value="nao">Não, apenas a mesa</option>
                    <option value="sim">Sim, desejo bolo 🎂</option>
                </select>
            </div>
        </div>

        <div id="painelBolo" class="secao-bolo">
            <div id="tipoBoloBadge" class="badge"></div>
            
            <div class="campo">
                <label>Sabor do Bolo</label>
                <div class="input-container">
                    <i class="fas fa-list"></i>
                    <select id="sabor">
                        <option value="Brigadeiro">Brigadeiro</option>
                        <option value="Brigadeiro Maracujá / Brig Chocolate">Brigadeiro Maracujá / Brig Chocolate</option>
                        <option value="Ninho com Nutella">Ninho com Nutella</option>
                        <option value="Ninho com Morango">Ninho com Morango</option>
                        <option value="Ninho com Abacaxi">Ninho com Abacaxi</option>
                        <option value="Mousse de Chocolate Preto">Mousse de Chocolate Preto</option>
                        <option value="Mousse de Coco">Mousse de Coco</option>
                        <option value="Prestígio">Prestígio</option>
                    </select>
                </div>
            </div>

            <div class="campo">
                <label id="labelKg">Quilos (Máximo 3kg)</label>
                <div class="input-container">
                    <i class="fas fa-weight-hanging"></i>
                    <input type="number" id="kg" value="1" min="1" max="3" oninput="validarFluxo()">
                </div>
            </div>

            <div id="detalhesFinanceiros" class="info-pagamento" style="display:none;">
                <b>Total a Pagar: R$ <span id="valorTotal">0,00</span></b><br>
                <b>Sinal para reserva (50%): <span style="color:var(--primary);">R$ <span id="valorSinal">0,00</span></span></b>
                
                <div class="pix-qr-container">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=13791998000131" alt="QR Code PIX">
                </div>
                
                <small>Chave CNPJ: 13.791.998/0001-31</small><br>
                <button type="button" class="btn-copiar" onclick="copiarPix()">
                    <i class="fas fa-copy"></i> Copiar Chave PIX
                </button>
            </div>
        </div>

        <button type="button" id="btnEnviar" class="btn-enviar" onclick="enviarWhatsApp()">
            <i class="fab fa-whatsapp"></i> CONCLUIR RESERVA
        </button>
    </form>
</div>

<script>
    const SEU_TELEFONE = "5511967105333";
    const VALOR_KG = 95.00;
    const CHAVE_PIX = "13791998000131";

    // Bloqueia datas passadas no calendário
    document.getElementById('data').min = new Date().toISOString().split('T')[0];

    function copiarPix() {
        navigator.clipboard.writeText(CHAVE_PIX);
        alert("Chave PIX copiada!");
    }

    function validarFluxo() {
        const campoData = document.getElementById('data');
        const dataVal = campoData.value;
        const horaVal = document.getElementById('horario').value;
        const pessoas = parseInt(document.getElementById('pessoas').value) || 0;
        const querBolo = document.getElementById('querBolo').value;
        const painelBolo = document.getElementById('painelBolo');
        const badge = document.getElementById('tipoBoloBadge');
        const btn = document.getElementById('btnEnviar');
        const kg = parseFloat(document.getElementById('kg').value) || 1;
        const divFinanceiro = document.getElementById('detalhesFinanceiros');

        if(!dataVal) return;
        
        // Verifica o dia da semana (0: Dom, 1: Seg, 2: Ter, 3: Qua, 4: Qui, 5: Sex, 6: Sáb)
        const dataObj = new Date(dataVal + 'T12:00:00');
        const diaSemana = dataObj.getDay(); 

        // BLOQUEIO: Se for Sexta (5), Sábado (6) ou Domingo (0)
        if (diaSemana === 5 || diaSemana === 6 || diaSemana === 0) {
            alert("⚠️ Reservas disponíveis apenas de Segunda a Quinta-feira.");
            campoData.value = ""; // Limpa a data selecionada
            btn.disabled = true;
            btn.innerHTML = 'RESERVAS: SEG A QUI';
            painelBolo.style.display = 'none';
            return;
        }

        let eBloqueadoHora = false;
        if(horaVal) {
            const [h, m] = horaVal.split(':').map(Number);
            const totalMinutos = h * 60 + m;
            // 12:00 (720 min) até 21:30 (1290 min)
            if(totalMinutos < 720 || totalMinutos > 1290) eBloqueadoHora = true;
        }

        if(eBloqueadoHora) {
            btn.disabled = true;
            btn.innerHTML = 'HORÁRIO: 12H ÀS 21:30';
            painelBolo.style.display = 'none';
        } else {
            btn.disabled = false;
            btn.innerHTML = '<i class="fab fa-whatsapp"></i> CONCLUIR RESERVA';
            
            if(querBolo === 'sim') {
                painelBolo.style.display = 'block';
                let total = 0;
                
                if(pessoas >= 10) {
                    painelBolo.className = 'secao-bolo modo-cortesia';
                    badge.innerText = '🎁 1kg Cortesia Aplicado';
                    badge.className = 'badge badge-cortesia';
                    total = Math.max(0, (kg - 1) * VALOR_KG);
                } else {
                    painelBolo.className = 'secao-bolo modo-encomenda';
                    badge.innerText = '🛒 Encomenda Particular';
                    badge.className = 'badge badge-encomenda';
                    total = kg * VALOR_KG;
                }

                if(total > 0) {
                    document.getElementById('valorTotal').innerText = total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                    document.getElementById('valorSinal').innerText = (total/2).toLocaleString('pt-BR', {minimumFractionDigits: 2});
                    divFinanceiro.style.display = 'block';
                } else {
                    divFinanceiro.style.display = 'none';
                }
            } else { painelBolo.style.display = 'none'; }
        }
    }

    function enviarWhatsApp() {
        const nome = document.getElementById('nome').value;
        const dataRaw = document.getElementById('data').value;
        const horario = document.getElementById('horario').value;
        const pessoas = parseInt(document.getElementById('pessoas').value);
        const querBolo = document.getElementById('querBolo').value;
        
        if(!nome || !dataRaw || !horario || !pessoas) return alert("Por favor, preencha todos os campos!");

        const dataBr = dataRaw.split('-').reverse().join('/');
        let texto = `*RESERVA - NOSSA CARNE*\n\n👤 *Cliente:* ${nome}\n📅 *Data:* ${dataBr}\n⏰ *Hora:* ${horario}\n👥 *Pessoas:* ${pessoas}\n⚠️ _Ciente da taxa de rolha (R$40)._`;

        if (querBolo === 'sim') {
            const kg = parseFloat(document.getElementById('kg').value);
            const ehCortesia = (pessoas >= 10);
            const valorTotal = ehCortesia ? Math.max(0, (kg - 1) * VALOR_KG) : (kg * VALOR_KG);
            
            texto += `\n\n🎂 *BOLO:* ${ehCortesia ? 'CORTESIA (1kg Grátis)' : 'ENCOMENDA'}\n🍰 *Sabor:* ${document.getElementById('sabor').value}\n⚖️ *Peso:* ${kg}kg`;
            
            if(valorTotal > 0) {
                texto += `\n💰 *Total Excedente:* R$ ${valorTotal.toFixed(2).replace('.',',')}\n💳 *Sinal 50%:* R$ ${(valorTotal / 2).toFixed(2).replace('.',',')}`;
            } else if(ehCortesia) {
                texto += `\n✨ *Status:* Cortesia Total (100% Grátis)`;
            }
        }

        window.open(`https://wa.me/${SEU_TELEFONE}?text=${encodeURIComponent(texto)}`, '_blank');
    }
</script>
</body>
</html>
